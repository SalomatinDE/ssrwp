version: '3.8'

services:
  # База данных PostgreSQL
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Бэкенд
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: 5000
    depends_on:
      - postgres
    command: sh -c "npx sequelize-cli db:migrate && node app.js"

  # Веб-сервер Nginx
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      # Монтируем скомпилированную папку фронтенда из репозитория
      - ./client/dist:/usr/share/nginx/html:ro
      # Монтируем конфигурационный файл Nginx
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

volumes:
  pgdata: