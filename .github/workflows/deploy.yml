name: Deploy Production

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: |
          client/package-lock.json
          server/package-lock.json

    # --- СБОРКА КЛИЕНТА ---
    - name: Install Client Deps
      run: cd client && npm ci

    - name: Lint Client
      run: cd client && npm run lint --if-present

    - name: Build Client
      env:
        VITE_API_URL: http://${{ secrets.SERVER_HOST }}/api
      run: cd client && npm run build

    # --- ТЕСТИРОВАНИЕ БЭКЕНДА ---
    - name: Install Server Deps
      run: cd server && npm ci

    - name: Run Server Tests
      run: cd server && npm test --if-present

    # --- ДЕПЛОЙ ---
    - name: Copy files to Server via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "server/,client/dist/,docker-compose.yml,nginx.conf,.env.example"
        target: "/home/${{ secrets.SERVER_USER }}/app"

    - name: Executing remote ssh commands to deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /home/${{ secrets.SERVER_USER }}/app
          
          # Создаем рабочий файл .env, если его еще нет на сервере
          if [ ! -f .env ]; then
            cp .env.example .env
          fi
          
          # Перезапускаем контейнеры с пересборкой бэкенда
          sudo docker compose down
          sudo docker compose up --build -d